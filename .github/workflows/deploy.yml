name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            cd /opt/trustpilot-members

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart containers
            docker compose build --no-cache app queue baileys frontend
            docker compose up -d --force-recreate

            # Clear Laravel caches
            docker exec tp-app php artisan optimize:clear
            docker exec tp-app php artisan optimize

            # Run migrations
            docker exec tp-app php artisan migrate --force

            echo "Deploy complete: $(date)"
